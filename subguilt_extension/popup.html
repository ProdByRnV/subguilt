<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 250px;
      padding: 15px;
      background-color: #121212;
      color: #ffffff;
      text-align: center;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #4CAF50;
    }
    p {
      font-size: 13px;
      color: #aaaaaa;
    }
    .status-dot {
      height: 10px;
      width: 10px;
      background-color: #4CAF50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      background-color: #333;
      color: white;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
  <h2><span class="status-dot"></span>SubGuilt Active</h2>
  <p>Monitoring watch time locally.</p>
  <p id="sessionCount">Unsynced sessions: 0</p>
  <button id="syncNow">Force Sync</button>
  <script src="popup.js"></script>
</body>
</html>
